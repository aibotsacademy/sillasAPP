<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Reportes | Silla de Ruedas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --pink:   #ec4899;
            --purple: #a855f7;
            --green:  #10b981;
            --yellow: #f59e0b;
            --red:    #ef4444;
            --bg:     #0a0e27;
            --surface: rgba(15, 23, 42, 0.85);
            --border: rgba(236, 72, 153, 0.25);
            --text:   #e2e8f0;
            --muted:  #64748b;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            min-height: 100vh; min-height: 100dvh;
            color: var(--text);
            overflow-x: hidden;
        }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .app-shell { position: relative; z-index: 2; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

        /* ── HEADER ── */
        .app-header {
            background: rgba(10, 14, 39, 0.90);
            backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px; position: sticky; top: 0; z-index: 10; flex-shrink: 0;
        }
        .header-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .header-brand { display: flex; align-items: center; gap: 9px; }
        .btn-back {
            width: 34px; height: 34px; border-radius: 10px;
            background: rgba(236,72,153,0.1); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 16px; cursor: pointer; flex-shrink: 0;
        }
        .brand-text { font-size: 15px; font-weight: 800; background: linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand-sub  { font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; text-transform: uppercase; }
        .user-chip {
            display: flex; align-items: center; gap: 6px;
            background: rgba(236,72,153,0.08); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 10px 4px 4px;
        }
        .user-chip .av {
            width: 22px; height: 22px; border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .user-chip .un { font-size: 11px; font-weight: 600; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ── FILTER BAR ── */
        .filter-bar { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .scope-toggle {
            display: flex; background: rgba(30,41,59,0.6); border: 1px solid var(--border);
            border-radius: 10px; padding: 3px; flex-shrink: 0;
        }
        .scope-btn {
            border: none; background: transparent; color: var(--muted);
            font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif;
            padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .scope-btn.active { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; }

        .search-input {
            flex: 1; min-width: 120px; padding: 8px 12px;
            background: rgba(30,41,59,0.6); border: 1px solid var(--border);
            border-radius: 10px; color: #fff; font-size: 13px; outline: none;
            font-family: 'Syne', sans-serif;
        }
        .search-input:focus { border-color: var(--pink); }
        .search-input::placeholder { color: #475569; }

        .status-select {
            padding: 8px 10px; background: rgba(30,41,59,0.6); border: 1px solid var(--border);
            border-radius: 10px; color: #cbd5e1; font-size: 12px; outline: none; cursor: pointer;
            font-family: 'Syne', sans-serif;
        }
        .status-select option { background: #1e293b; }

        /* ✅ NUEVO: selector de fecha + toggle 'ver todo' */
        .date-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .date-input {
            padding: 8px 12px; background: rgba(30,41,59,0.6); border: 1px solid var(--border);
            border-radius: 10px; color: #fff; font-size: 13px; outline: none; cursor: pointer;
            font-family: 'Syne', sans-serif; color-scheme: dark;
        }
        .date-input:focus { border-color: var(--pink); }
        .date-input:disabled { opacity: 0.4; cursor: not-allowed; }
        .today-btn {
            padding: 8px 12px; background: rgba(236,72,153,0.12); border: 1px solid var(--border);
            border-radius: 10px; color: #f9a8d4; font-size: 12px; font-weight: 700; cursor: pointer;
            font-family: 'Syne', sans-serif; white-space: nowrap;
        }
        .allday-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; cursor: pointer; user-select: none; }
        .allday-toggle input { accent-color: var(--pink); cursor: pointer; }
        .allday-warning {
            font-size: 11px; color: #fcd34d; background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.25); border-radius: 8px; padding: 6px 10px;
            margin-top: 8px; display: none;
        }
        .allday-warning.show { display: block; }

        /* ── STATS ── */
        .stats-row { display: flex; gap: 8px; padding: 12px 16px 0; max-width: 560px; margin: 0 auto; width: 100%; }
        .stat-chip {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 10px 8px; text-align: center;
        }
        .stat-chip .num { font-size: 18px; font-weight: 800; color: #fff; font-family: 'JetBrains Mono', monospace; }
        .stat-chip .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .stat-chip.completado .num { color: var(--green); }
        .stat-chip.proceso .num    { color: var(--yellow); }

        /* ── CONTENT ── */
        .app-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 16px 40px; max-width: 560px; margin: 0 auto; width: 100%; }
        .app-content::-webkit-scrollbar { width: 3px; }

        /* ── REPORT CARD ── */
        .report-card {
            background: var(--surface); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 16px;
            padding: 16px 16px; margin-bottom: 10px; cursor: pointer;
            transition: all 0.2s ease; animation: fadeUp 0.3s ease;
        }
        .report-card:active { transform: scale(0.98); }
        .report-card.en-proceso { border-color: rgba(245,158,11,0.4); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        .rc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
        .rc-flight { font-size: 17px; font-weight: 800; color: #fff; }
        .rc-airline { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .rc-badge {
            font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
            white-space: nowrap; flex-shrink: 0;
        }
        .rc-badge.completado { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
        .rc-badge.en-proceso { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }

        .rc-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .rc-tag {
            font-size: 10px; color: #94a3b8; background: rgba(148,163,184,0.08);
            border: 1px solid rgba(148,163,184,0.15); border-radius: 8px; padding: 3px 8px;
            font-family: 'JetBrains Mono', monospace;
        }
        .rc-tag.incident { color: #fca5a5; background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }

        .rc-bottom { display: flex; justify-content: space-between; align-items: center; }
        .rc-report-id { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
        .rc-duration { font-size: 12px; font-weight: 700; color: var(--pink); font-family: 'JetBrains Mono', monospace; }

        .btn-resume {
            width: 100%; margin-top: 12px; padding: 11px;
            background: linear-gradient(135deg, var(--yellow), #f97316);
            border: none; border-radius: 10px; color: #fff;
            font-size: 13px; font-weight: 700; cursor: pointer;
            font-family: 'Syne', sans-serif; transition: all 0.2s;
        }
        .btn-resume:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,158,11,0.35); }

        /* ── EMPTY / LOADING ── */
        .empty-state, .loading-state {
            text-align: center; padding: 60px 20px; color: var(--muted);
        }
        .empty-state .ic, .loading-state .ic { font-size: 40px; margin-bottom: 12px; }
        .spinner {
            width: 34px; height: 34px; border: 3px solid rgba(236,72,153,0.2);
            border-top-color: var(--pink); border-radius: 50%;
            animation: spin .8s linear infinite; margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── DETAIL MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200; background: rgba(5,8,20,0.8);
            backdrop-filter: blur(6px); display: none; align-items: flex-end;
            justify-content: center; padding: 0;
        }
        .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .modal-sheet {
            width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto;
            background: rgba(15,23,42,0.97); border: 1px solid var(--border);
            border-radius: 24px 24px 0 0; padding: 22px 20px 30px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 40px; height: 4px; background: rgba(148,163,184,0.3); border-radius: 4px; margin: 0 auto 18px; }
        .modal-close {
            position: absolute; top: 16px; right: 16px; width: 30px; height: 30px;
            border-radius: 8px; background: rgba(148,163,184,0.15); border: none;
            color: #cbd5e1; font-size: 16px; cursor: pointer;
        }
        .modal-title { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px; }
        .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; font-family: 'JetBrains Mono', monospace; }

        .detail-section-title { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }
        .detail-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(148,163,184,0.08); font-size: 13px; gap: 10px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--muted); flex-shrink: 0; }
        .detail-value { font-weight: 600; text-align: right; }
        .detail-value.incident { color: #fca5a5; }

        @media (max-width: 480px) {
            .app-content { padding: 10px 12px 32px; }
            .stats-row { padding: 10px 12px 0; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="app-shell">
        <header class="app-header">
            <div class="header-row">
                <div class="header-brand">
                    <button class="btn-back" onclick="goBack()">←</button>
                    <div>
                        <div class="brand-text">Historial</div>
                        <div class="brand-sub">Wheelchair Services</div>
                    </div>
                </div>
                <div class="user-chip">
                    <div class="av" id="avatarInitial">?</div>
                    <div class="un" id="usernameDisplay">…</div>
                </div>
            </div>

            <div class="filter-bar">
                <div class="scope-toggle">
                    <button class="scope-btn active" id="scopeMine" onclick="setScope('mine')">Mis Reportes</button>
                    <button class="scope-btn" id="scopeAll" onclick="setScope('all')">Todos</button>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar vuelo…" oninput="renderList()">
                <select class="status-select" id="statusFilter" onchange="renderList()">
                    <option value="">Todos los estados</option>
                    <option value="Completado">Completados</option>
                    <option value="En Proceso">En Proceso</option>
                </select>
            </div>

            <div class="date-row">
                <input type="date" class="date-input" id="dateFilter" onchange="loadHistory()">
                <button class="today-btn" onclick="setToday()">Hoy</button>
                <label class="allday-toggle">
                    <input type="checkbox" id="allDaysToggle" onchange="toggleAllDays()">
                    Ver todo el historial
                </label>
            </div>
            <div class="allday-warning" id="allDayWarning">⚠️ Esto carga miles de reportes y puede tardar varios segundos.</div>
        </header>

        <div class="stats-row">
            <div class="stat-chip"><div class="num" id="statTotal">–</div><div class="lbl">Total</div></div>
            <div class="stat-chip completado"><div class="num" id="statCompletado">–</div><div class="lbl">Completados</div></div>
            <div class="stat-chip proceso"><div class="num" id="statProceso">–</div><div class="lbl">En Proceso</div></div>
        </div>

        <div class="app-content">
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <div>Cargando historial…</div>
            </div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="ic">📭</div>
                <div>No se encontraron reportes</div>
            </div>
            <div id="reportList"></div>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
        <div class="modal-sheet">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-handle"></div>
            <div class="modal-title" id="modalFlight">–</div>
            <div class="modal-sub" id="modalReportId">–</div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUBk_-yW99Fw-yExqrTtXZulen78EbWfHhs6iSG7GYZom-d7Aa16wLQy8QrgHp9c7Z/exec';
        const AIRLINE_NAMES = { B6:'Jetblue', AS:'Alaska', DL:'Delta', WN:'Southwest', AA:'American', WS:'Westjet', AC:'Air Canada', PD:'Porter', UA:'United', WK:'Edelweiss', E9:'Iberojet', IB:'Iberojet' };

        let currentUser = null;
        let allReports  = [];
        let scope       = 'mine';

        // ── Auth ──
        (function checkAuth() {
            const raw = sessionStorage.getItem('user');
            if (!raw) { window.location.href = 'LT.html'; return; }
            try {
                currentUser = JSON.parse(raw);
                document.getElementById('usernameDisplay').textContent = currentUser.username;
                document.getElementById('avatarInitial').textContent   = (currentUser.username||'?').slice(0,2).toUpperCase();
            } catch(e) { window.location.href = 'LT.html'; }
        })();

        // ── Three.js background (igual que RT.html) ──
        const cntr = document.getElementById('canvas-container');
        const sc   = new THREE.Scene();
        const cm   = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd   = new THREE.WebGLRenderer({ alpha:true, antialias:true });
        rd.setSize(window.innerWidth, window.innerHeight);
        cntr.appendChild(rd.domElement);
        const geo = new THREE.BufferGeometry();
        const N   = 2000, pos = new Float32Array(N*3);
        for(let i=0; i<N*3; i++) pos[i]=(Math.random()-.5)*100;
        geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
        const mat = new THREE.PointsMaterial({size:.07, color:0xa855f7, transparent:true, opacity:.55, blending:THREE.AdditiveBlending});
        const pts = new THREE.Points(geo, mat);
        sc.add(pts); cm.position.z=30;
        (function a(){requestAnimationFrame(a); pts.rotation.y+=.0006; rd.render(sc,cm);})();
        window.addEventListener('resize',()=>{cm.aspect=window.innerWidth/window.innerHeight; cm.updateProjectionMatrix(); rd.setSize(window.innerWidth,window.innerHeight);});

        // ── Load history ──
        function loadHistory() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('emptyState').style.display   = 'none';
            document.getElementById('reportList').innerHTML = '';

            const cbName = 'histCb' + Date.now();
            window[cbName] = function(response) {
                delete window[cbName];
                const scr = document.getElementById('hist-script');
                if (scr) scr.remove();
                document.getElementById('loadingState').style.display = 'none';

                if (response && response.success) {
                    allReports = response.reports || [];
                    renderList();
                } else {
                    document.getElementById('emptyState').style.display = 'block';
                    document.querySelector('#emptyState div:last-child').textContent =
                        'Error: ' + (response ? response.message : 'conexión fallida');
                }
            };

            let url = SCRIPT_URL + '?callback=' + cbName;
            if (scope === 'mine') {
                url += '&action=getSillasHistory&inspector=' + encodeURIComponent(currentUser.username);
            } else {
                url += '&action=getAllHistory';
            }

            // ✅ NUEVO: filtro de fecha (omitido si 'Ver todo el historial' está marcado)
            const allDays = document.getElementById('allDaysToggle').checked;
            if (!allDays) {
                const fecha = document.getElementById('dateFilter').value;
                if (fecha) url += '&fecha=' + encodeURIComponent(fecha);
            }

            const scr = document.createElement('script');
            scr.id = 'hist-script';
            scr.src = url;
            scr.onerror = () => {
                delete window[cbName];
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
            };
            document.body.appendChild(scr);
        }

        // ✅ NUEVO: fecha local de hoy en formato YYYY-MM-DD (evita el corrimiento de toISOString por UTC)
        function getTodayLocalISO() {
            const d = new Date();
            const off = d.getTimezoneOffset();
            const local = new Date(d.getTime() - off * 60000);
            return local.toISOString().split('T')[0];
        }

        function setToday() {
            document.getElementById('allDaysToggle').checked = false;
            document.getElementById('dateFilter').disabled = false;
            document.getElementById('dateFilter').value = getTodayLocalISO();
            loadHistory();
        }

        function toggleAllDays() {
            const allDays = document.getElementById('allDaysToggle').checked;
            document.getElementById('dateFilter').disabled = allDays;
            document.getElementById('allDayWarning').classList.toggle('show', allDays);
            loadHistory();
        }

        function setScope(s) {
            scope = s;
            document.getElementById('scopeMine').classList.toggle('active', s === 'mine');
            document.getElementById('scopeAll').classList.toggle('active', s === 'all');
            loadHistory();
        }

        // ── Render list with filters ──
        function renderList() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const status = document.getElementById('statusFilter').value;

            let filtered = allReports.filter(r => {
                if (status && r.estado !== status) return false;
                if (search) {
                    const haystack = (r.vuelo + ' ' + r.aerolinea + ' ' + r.numeroReporte).toLowerCase();
                    if (!haystack.includes(search)) return false;
                }
                return true;
            });

            // Stats (sobre el set completo del scope actual, no del filtro)
            const total = allReports.length;
            const completados = allReports.filter(r => r.estado === 'Completado').length;
            const proceso = allReports.filter(r => r.estado !== 'Completado').length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statCompletado').textContent = completados;
            document.getElementById('statProceso').textContent = proceso;

            const listEl = document.getElementById('reportList');
            document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';

            listEl.innerHTML = filtered.map(r => buildCardHTML(r)).join('');
        }

        function buildCardHTML(r) {
            const esCompletado = r.estado === 'Completado';
            const airlineName = AIRLINE_NAMES[r.aerolinea] || r.aerolinea || '–';
            const tieneIncidente = r.descripcionIncidente && r.descripcionIncidente !== 'Sin incidentes reportados';

            let tags = `<span class="rc-tag">📅 ${r.fechaCreacion || '–'} ${r.horaCreacion || ''}</span>`;
            if (r.tipoServicio) tags += `<span class="rc-tag">${r.tipoServicio}</span>`;
            if (tieneIncidente) tags += `<span class="rc-tag incident">⚠ Incidente</span>`;
            if (r.tieneFoto) tags += `<span class="rc-tag incident">📸 Foto</span>`;

            const idAttr = JSON.stringify(r).replace(/"/g, '&quot;');

            return `
                <div class="report-card ${esCompletado ? '' : 'en-proceso'}" onclick='openDetail(${idAttr})'>
                    <div class="rc-top">
                        <div>
                            <div class="rc-flight">${airlineName} ${r.vuelo || '–'}</div>
                            <div class="rc-airline">${r.usuario || ''}${r.rol ? ' · ' + r.rol : ''}</div>
                        </div>
                        <span class="rc-badge ${esCompletado ? 'completado' : 'en-proceso'}">${r.estado || 'En Proceso'}</span>
                    </div>
                    <div class="rc-meta">${tags}</div>
                    <div class="rc-bottom">
                        <span class="rc-report-id">${r.numeroReporte || '–'}</span>
                        <span class="rc-duration">${esCompletado ? (r.duracionTotal || 0) + ' min' : 'En curso'}</span>
                    </div>
                    ${(!esCompletado && r.usuario === currentUser.username) ? `<button class="btn-resume" onclick="event.stopPropagation(); resumeReport(${idAttr})">▶ Continuar Reporte</button>` : ''}
                </div>
            `;
        }

        // ── Detail modal ──
        function openDetail(r) {
            const airlineName = AIRLINE_NAMES[r.aerolinea] || r.aerolinea || '–';
            document.getElementById('modalFlight').textContent = airlineName + ' ' + (r.vuelo || '–');
            document.getElementById('modalReportId').textContent = r.numeroReporte || '–';

            let html = `
                <div class="detail-section-title">✈️ Información General</div>
                <div class="detail-row"><span class="detail-label">Inspector</span><span class="detail-value">${r.usuario || '–'}</span></div>
                <div class="detail-row"><span class="detail-label">Rol</span><span class="detail-value">${r.rol || '–'}</span></div>
                <div class="detail-row"><span class="detail-label">Tipo de Servicio</span><span class="detail-value">${r.tipoServicio || '–'}</span></div>
                <div class="detail-row"><span class="detail-label">Estado</span><span class="detail-value">${r.estado || '–'}</span></div>

                <div class="detail-section-title">⏱️ Tiempos</div>
                <div class="detail-row"><span class="detail-label">Creación</span><span class="detail-value">${r.fechaCreacion||'–'} ${r.horaCreacion||''}</span></div>
                <div class="detail-row"><span class="detail-label">Silla Asignada</span><span class="detail-value">${r.fechaAsignacion||'–'} ${r.horaAsignacion||''}</span></div>
                <div class="detail-row"><span class="detail-label">Inicio Servicio</span><span class="detail-value">${r.fechaInicioServicio||'–'} ${r.horaInicioServicio||''}</span></div>
                <div class="detail-row"><span class="detail-label">Fin Servicio</span><span class="detail-value">${r.fechaFinServicio||'–'} ${r.horaFinServicio||''}</span></div>
                <div class="detail-row"><span class="detail-label">Retorno de Silla</span><span class="detail-value">${r.fechaRetorno||'–'} ${r.horaRetorno||''}</span></div>
                <div class="detail-row"><span class="detail-label">Duración Total</span><span class="detail-value">${r.duracionTotal || 0} min</span></div>
                <div class="detail-row"><span class="detail-label">Ciclo Completo</span><span class="detail-value">${r.tiempoCiclo || 0} min</span></div>
            `;

            if (r.descripcionIncidente && r.descripcionIncidente !== 'Sin incidentes reportados') {
                html += `
                    <div class="detail-section-title">⚠️ Incidente</div>
                    <div class="detail-row"><span class="detail-label">Descripción</span><span class="detail-value incident">${r.descripcionIncidente}</span></div>
                    <div class="detail-row"><span class="detail-label">Foto adjunta</span><span class="detail-value">${r.tieneFoto ? 'Sí' : 'No'}</span></div>
                `;
            }

            if (r.estado !== 'Completado' && r.usuario === currentUser.username) {
                html += `<button class="btn-resume" style="margin-top:18px;" onclick='resumeReport(${JSON.stringify(r).replace(/"/g, "&quot;")})'>▶ Continuar Reporte</button>`;
            }

            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // ── Resume: guarda en sessionStorage y regresa a RT.html ──
        function resumeReport(r) {
            sessionStorage.setItem('resumeSillaReport', JSON.stringify(r));
            window.location.href = 'RT.html';
        }

        function goBack() {
            window.location.href = 'RT.html';
        }

        // ── Init ──
        document.getElementById('dateFilter').value = getTodayLocalISO();
        loadHistory();
    </script>
</body>
</html>
